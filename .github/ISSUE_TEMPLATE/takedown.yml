name: Takedown request
description: Report a Petdex pet that infringes your IP or rights
title: "[Takedown] <pet-slug>"
labels: ["takedown-request"]
body:
  - type: markdown
    attributes:
      value: |
        Petdex hosts user-submitted fan-art pixel pets. If you're a rights holder
        (or authorized representative) and want a pet removed, fill this form.
        We review takedowns manually — typical response under 48 hours.

        For non-IP issues (bugs, broken sprites, etc.) please open a regular issue.
  - type: input
    id: pet-slug
    attributes:
      label: Pet slug
      description: The slug from the pet URL — e.g. `goku` from petdex.dev/pets/goku
      placeholder: pet-slug
    validations:
      required: true
  - type: dropdown
    id: affiliation
    attributes:
      label: Your affiliation
      options:
        - Rights holder
        - Authorized representative
        - Subject of likeness (this depicts me)
        - Other
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason for takedown
      description: Briefly describe the IP, mark, or right you believe is infringed.
      placeholder: |
        e.g. "This pet uses the name and visual likeness of a character from my published series."
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Contact email
      description: We'll respond here. Public email visible in this issue — use a forward if needed.
      placeholder: legal@example.com
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I have a good-faith belief that the use described above is not authorized.
          required: true
        - label: The information in this report is accurate to the best of my knowledge.
          required: true
