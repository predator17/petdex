<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Petdex</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0a0a1a;width:192px;height:288px;overflow:hidden;user-select:none;-webkit-user-select:none;transition:width .3s,height .3s}
body.expanded{overflow:auto}
#root{position:fixed;top:0;left:0;width:192px;height:288px;cursor:grab;z-index:1}
#root:active{cursor:grabbing}
.pet-sprite{
  --sprite-row:0;--sprite-frames:6;--sprite-duration:1100ms;
  --sprite-y:calc(var(--sprite-row) * -208px);
  --sprite-end-x:calc(var(--sprite-frames) * -192px);
  position:absolute;bottom:0;left:0;width:192px;height:208px;
  background-image:none;
  background-repeat:no-repeat;background-size:1536px 1872px;
  image-rendering:pixelated;
  animation:pet-state var(--sprite-duration) steps(var(--sprite-frames)) infinite;
  pointer-events:none;transition:transform .15s ease,filter .2s ease
}
#root:active .pet-sprite{transform:scale(1.1);filter:brightness(1.2)}
.pet-sprite.fast{transform:scale(1.15) rotate(-5deg);filter:brightness(1.3) drop-shadow(0 0 8px #ffd700)}
@keyframes pet-state{from{background-position:0 var(--sprite-y)}to{background-position:var(--sprite-end-x) var(--sprite-y)}}
#quit{position:absolute;top:4px;right:4px;width:24px;height:24px;background:#e74c3c;border-radius:5px;z-index:100;display:flex;align-items:center;justify-content:center;color:#fff;font:bold 14px sans-serif;cursor:pointer;border:2px solid #c0392b;pointer-events:auto}
#quit:hover{background:#ff5555;transform:scale(1.1)}
#gallery-btn{position:absolute;top:4px;right:34px;width:24px;height:24px;background:#2a4a8a;border-radius:5px;z-index:100;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;pointer-events:auto;border:1px solid #3a5a9a}
#gallery-btn:hover{background:#3a6abb;transform:scale(1.1)}
#switch-btn{position:absolute;top:4px;right:64px;width:24px;height:24px;background:#2a8a4a;border-radius:5px;z-index:100;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;pointer-events:auto;border:1px solid #3a9a5a}
#switch-btn:hover{background:#3abb6a;transform:scale(1.1)}
#bubble{position:absolute;bottom:218px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);color:#111;font:11px/1.4 system-ui,sans-serif;padding:6px 10px;border-radius:8px;max-width:180px;box-shadow:0 2px 8px rgba(0,0,0,.3);opacity:0;transition:opacity .25s ease;pointer-events:none;white-space:pre-wrap;z-index:20}
#bubble.visible{opacity:1}
#label{position:absolute;top:5px;left:8px;font:10px monospace;color:rgba(255,215,0,.45);pointer-events:none;z-index:5}

/* Settings panel */
#settings{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:#12122a;z-index:30;overflow:auto;padding:12px;
  font:13px/1.5 system-ui,sans-serif;color:#ddd
}
#settings.visible{display:block}
#settings h3{font-size:14px;margin-bottom:8px;color:#6b8cff}
#settings input{width:100%;padding:6px;background:#1e1e3a;border:1px solid #444;border-radius:4px;color:#eee;font:12px monospace;margin-bottom:6px}
#settings button{padding:6px 14px;background:#6b8cff;border:none;border-radius:4px;color:#fff;cursor:pointer;margin-bottom:10px}
#settings .cost{font-size:11px;color:#888;margin-bottom:12px;padding-top:8px;border-top:1px solid #333}
#settings .close-btn{position:absolute;top:8px;right:8px;width:24px;height:24px;background:#444;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font:14px sans-serif}

/* Gallery panel */
#gallery{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:#12122a;z-index:30;overflow:hidden;
  font:12px/1.4 system-ui,sans-serif;color:#ddd
}
#gallery.visible{display:block}
#gallery-header{
  position:absolute;top:0;left:0;right:0;z-index:60;
  background:#12122a;padding:8px 10px 6px;
  border-bottom:1px solid #2a2a4a
}
#gallery h3{font-size:14px;margin-bottom:6px;color:#6b8cff}
#gallery .close-btn{position:absolute;top:8px;right:8px;width:32px;height:32px;background:#e74c3c;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font:bold 18px sans-serif;z-index:50;border:2px solid #c0392b}
#gallery .close-btn:hover{background:#ff5555;transform:scale(1.1)}
#gallery .search{width:calc(100% - 45px);padding:8px;background:#1e1e3a;border:1px solid #444;border-radius:6px;color:#eee;font:13px sans-serif;margin-bottom:6px}
#gallery .cat-tabs{display:flex;gap:6px;margin-bottom:0;flex-wrap:wrap}
#gallery-scroll{
  position:absolute;top:110px;left:0;right:0;bottom:0;
  overflow:auto;padding:10px
}
#gallery .cat-tab{padding:4px 12px;background:#1e1e3a;border-radius:12px;font-size:11px;color:#888;cursor:pointer;user-select:none;transition:background .2s,color .2s}
#gallery .cat-tab:hover{background:#2a2a4a;color:#ccc}
#gallery .cat-tab.active{background:#6b8cff;color:#fff}
#gallery .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding-bottom:20px}
#gallery .pet-card{background:#1e1e3a;border-radius:8px;padding:8px;cursor:pointer;text-align:center;overflow:hidden;transition:background .2s;border:1px solid #2a2a4a}
#gallery .pet-card:hover{background:#2a4a6a;border-color:#4a7aaa}
#gallery .pet-card .pet-anim{width:96px;height:104px;margin:0 auto 6px;overflow:hidden;position:relative;border-radius:6px;background:#0a0a1a}
#gallery .pet-card .pet-anim-inner{
  width:96px;height:104px;
  background-repeat:no-repeat;background-size:768px 936px;
  image-rendering:pixelated;
  animation:gallery-idle 1100ms steps(6) infinite;
}
@keyframes gallery-idle{from{background-position:0 0}to{background-position:-576px 0}}
#gallery .pet-card .pname{font-size:11px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
#gallery .pet-card .pslug{font-size:9px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#gallery .loading{text-align:center;padding:30px;color:#666;font-size:13px}
#gallery .sentinel{height:60px;display:flex;align-items:center;justify-content:center;color:#555;font-size:11px}
#gallery .pet-btn{width:100%;padding:4px;margin-top:4px;border:none;border-radius:4px;color:#fff;font:11px sans-serif;cursor:pointer}
#gallery .pet-btn:hover{opacity:0.85}

/* Switcher panel (reuses gallery card styles) */
#switcher{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:#12122a;z-index:30;overflow:hidden;font:12px/1.4 system-ui,sans-serif;color:#ddd}
#switcher.visible{display:block}
#switcher-header{position:absolute;top:0;left:0;right:0;z-index:60;background:#12122a;padding:8px 10px 6px;border-bottom:1px solid #2a2a4a}
#switcher h3{font-size:14px;margin-bottom:6px;color:#6b8cff}
#switcher .close-btn{position:absolute;top:8px;right:8px;width:32px;height:32px;background:#e74c3c;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font:bold 18px sans-serif;z-index:50;border:2px solid #c0392b}
#switcher-scroll{position:absolute;top:50px;left:0;right:0;bottom:0;overflow:auto;padding:10px}
#switcher .grid{display:grid;gap:10px;padding-bottom:20px}
#switcher .pet-card{background:#1e1e3a;border-radius:8px;padding:8px;cursor:pointer;text-align:center;overflow:hidden;transition:background .2s;border:1px solid #2a2a4a}
#switcher .pet-card:hover{background:#2a4a6a;border-color:#4a7aaa}
#switcher .pet-card .pet-anim{width:96px;height:104px;margin:0 auto 6px;overflow:hidden;position:relative;border-radius:6px;background:#0a0a1a}
#switcher .pet-card .pet-anim-inner{width:96px;height:104px;background-repeat:no-repeat;background-size:768px 936px;image-rendering:pixelated;animation:gallery-idle 1100ms steps(6) infinite}
#switcher .pet-card .pname{font-size:11px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
#switcher .pet-card .pslug{font-size:9px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#switcher .pet-btn{width:100%;padding:4px;margin-top:4px;border:none;border-radius:4px;color:#fff;font:11px sans-serif;cursor:pointer;background:#6b8cff}
#switcher .pet-btn:hover{opacity:0.85}
#switcher .loading{text-align:center;padding:30px;color:#666;font-size:13px}
</style>
</head>
<body>
<div id="root">
  <div id="quit">X</div>
  <div id="switch-btn">&#128259;</div>
  <div id="gallery-btn">&#128064;</div>
  <div id="label">奥瑞利安</div>
  <div class="pet-sprite" id="sprite"></div>
  <div id="bubble"></div>
</div>

<div id="settings">
  <div class="close-btn" id="settings-close">X</div>
  <h3>Settings</h3>
  <label style="font-size:11px;color:#888;display:block;margin-bottom:4px">OpenRouter API key (local only)</label>
  <input type="password" id="or-key" placeholder="sk-or-..."/>
  <button id="save-key">Save key</button>
  <div id="key-status" style="font-size:11px;color:#888;margin-bottom:12px">Enter your key for AI pet generation.</div>
  <div class="cost">
    <b>Pet generation cost</b><br/>
    ~10 images via gpt-image-2 = <b>$0.40</b>. With retries up to $0.80.<br/>
    You confirm before each generation.
  </div>
</div>

<div id="gallery">
  <div id="gallery-header">
    <div class="close-btn" id="gallery-close">X</div>
    <h3>Pet Library</h3>
    <div class="cat-tabs">
      <div class="cat-tab active" data-cat="all">All</div>
      <div class="cat-tab" data-cat="character">Characters</div>
      <div class="cat-tab" data-cat="creature">Creatures</div>
      <div class="cat-tab" data-cat="object">Objects</div>
    </div>
    <input type="text" class="search" id="pet-search" placeholder="Search 3700+ pets..."/>
  </div>
  <div id="gallery-scroll">
    <div class="grid" id="pet-grid"><div class="loading">Loading...</div></div>
  </div>
</div>

<div id="switcher">
  <div id="switcher-header">
    <div class="close-btn" id="switcher-close">X</div>
    <h3>Switch Pet</h3>
  </div>
  <div id="switcher-scroll">
    <div class="grid" id="switcher-grid" style="grid-template-columns:repeat(2,1fr)"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>// === DRAG: manual startDragging on mousedown (no data-tauri-drag-region) ===
// data-tauri-drag-region on #root captures ALL clicks, preventing buttons
// from working. Instead, we listen for mousedown on the background areas
// (not on buttons) and call Tauri's startDragging() manually. This is
// exactly how the macOS main.zig does it.
function setupManualDrag() {
  if (!window.__TAURI__ || !window.__TAURI__.window) {
    setTimeout(setupManualDrag, 200);
    return;
  }
  var win = window.__TAURI__.window.getCurrentWindow();
  var root = document.getElementById("root");
  root.addEventListener("mousedown", function (e) {
    // Only start drag for left-click on background (not buttons/sprite)
    if (e.button !== 0) return;
    var target = e.target;
    // Don't drag if clicking on interactive elements
    if (
      target.id === "quit" ||
      target.id === "switch-btn" ||
      target.id === "gallery-btn" ||
      target.closest(".pet-btn") ||
      target.closest(".close-btn") ||
      target.closest(".cat-tab") ||
      target.tagName === "INPUT" ||
      target.tagName === "BUTTON"
    ) {
      return;
    }
    win.startDragging().catch(function () {});
  });
}
setupManualDrag();

// === DRAG REACTION (Rust-side tracker, survives JS freeze) ===
// Rust records window Moved events during drag (even when JS is frozen).
// JS polls get_drag_result() every 100ms. When 'moved' is true and we
// haven't processed it yet, we read the direction/speed and react.
var lastProcessedDragId = 0;
function setupDragPoll() {
  if (!window.__TAURI__ || !window.__TAURI__.core) {
    setTimeout(setupDragPoll, 200);
    return;
  }
  var invoke = window.__TAURI__.core.invoke;
  setInterval(() => {
    invoke("get_drag_result")
      .then((r) => {
        if (!r || !r.moved) return;
        // New drag detected. Process it.
        var s = document.getElementById("sprite");
        if (!s) return;
        if (r.dist < 5) return; // too small, ignore

        // React based on direction + speed
        if (r.speed > 1.5) {
          // Fast drag → glow + whoosh + direction-aware running
          s.classList.add("fast");
          showBubble("whoosh!");
        } else {
          s.classList.remove("fast");
        }

        // Direction
        if (r.direction === "right") {
          setState("running-right");
        } else if (r.direction === "left") {
          setState("running-left");
        } else {
          setState("running");
        }

        // Reset tracker for next drag, then return to idle
        invoke("reset_drag").catch(() => {});
        setTimeout(() => {
          s.classList.remove("fast");
          setState("waving");
          showBubble("Done.");
          setTimeout(() => {
            setState("idle");
            hideBubble();
          }, 1200);
        }, 800);
      })
      .catch(() => {});
  }, 100);
}
setupDragPoll();

// === LOAD ACTIVE PET SPRITE DYNAMICALLY (not baked in CSS) ===
// The sprite is loaded at runtime via Tauri invoke, so switching pets
// actually changes the visible image without rebuilding HTML.
function loadActivePet() {
  if (!window.__TAURI__ || !window.__TAURI__.core) {
    setTimeout(loadActivePet, 200);
    return;
  }
  var invoke = window.__TAURI__.core.invoke;
  invoke("get_active_pet").then(function (pet) {
    if (!pet) {
      document.getElementById("label").textContent = "no pet";
      return;
    }
    document.getElementById("label").textContent = pet.name || pet.slug;
    invoke("read_file_as_base64", { path: pet.sprite_path }).then(function (b64) {
      var sprite = document.getElementById("sprite");
      if (sprite) {
        sprite.style.backgroundImage =
          "url(data:image/png;base64," + b64 + ")";
      }
    }).catch(function () {});
  }).catch(function () {
    setTimeout(loadActivePet, 500);
  });
}
loadActivePet();

// === BACKGROUND MANIFEST SYNC ===
// Fetch the manifest from petdex.dev on app launch and cache it in
// localStorage so the gallery opens instantly. Re-syncs every 30 min
// to pick up new pets while the app is running.
function startBackgroundSync() {
  if (!window.__TAURI__ || !window.__TAURI__.core) {
    setTimeout(startBackgroundSync, 500);
    return;
  }
  // Initial sync on launch
  syncManifestQuiet();
  // Re-sync every 30 minutes
  setInterval(syncManifestQuiet, 30 * 60 * 1000);
}

function syncManifestQuiet() {
  fetch("https://petdex.dev/api/manifest")
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var fresh = (data.pets || []).map(function (p) {
        return {
          slug: p.slug,
          name: p.displayName || p.slug,
          kind: p.kind || "unknown",
          sprite: p.spritesheetUrl || "",
        };
      });
      // Only update + cache if something changed
      if (fresh.length !== allPets.length ||
          (fresh.length > 0 && fresh[0].slug !== (allPets[0] || {}).slug)) {
        allPets = fresh;
        manifestCacheTime = Date.now();
        try {
          localStorage.setItem(MANIFEST_CACHE_KEY, JSON.stringify(allPets));
          localStorage.setItem(MANIFEST_CACHE_TIME_KEY, String(manifestCacheTime));
        } catch (e) {}
        // If gallery is open, refresh it
        if (document.getElementById("gallery") &&
            document.getElementById("gallery").classList.contains("visible")) {
          galleryFiltered = filterByCategory(allPets);
          galleryShown = 0;
          renderGalleryPage();
        }
      } else {
        // Same count — just update the cache timestamp
        manifestCacheTime = Date.now();
        try {
          localStorage.setItem(MANIFEST_CACHE_TIME_KEY, String(manifestCacheTime));
        } catch (e) {}
      }
    })
    .catch(function () {
      // Network error — keep using cached data
    });
}

// Also try loading cached manifest immediately on boot (instant gallery)
try {
  var cachedTime = parseInt(localStorage.getItem(MANIFEST_CACHE_TIME_KEY) || "0");
  var cached = localStorage.getItem(MANIFEST_CACHE_KEY);
  if (cached && cachedTime > 0) {
    allPets = JSON.parse(cached);
    manifestCacheTime = cachedTime;
  }
} catch (e) {}

// Start background sync after a short delay (let loadActivePet go first)
setTimeout(startBackgroundSync, 2000);

// === ANIMATION STATES ===
var ROWS = {
  idle: { row: 0, frames: 6, dur: 1100 },
  "running-right": { row: 1, frames: 8, dur: 1060 },
  "running-left": { row: 2, frames: 8, dur: 1060 },
  waving: { row: 3, frames: 4, dur: 700 },
  jumping: { row: 4, frames: 5, dur: 840 },
  failed: { row: 5, frames: 8, dur: 1220 },
  waiting: { row: 6, frames: 6, dur: 1010 },
  running: { row: 7, frames: 6, dur: 820 },
  review: { row: 8, frames: 6, dur: 1030 },
};
var currentState = "idle";
function setState(s) {
  if (s === currentState) return;
  currentState = s;
  var r = ROWS[s] || ROWS.idle;
  var el = document.getElementById("sprite");
  el.style.setProperty("--sprite-row", r.row);
  el.style.setProperty("--sprite-frames", r.frames);
  el.style.setProperty("--sprite-duration", r.dur + "ms");
}
function showBubble(t) {
  var b = document.getElementById("bubble");
  b.textContent = t;
  b.classList.add("visible");
}
function hideBubble() {
  document.getElementById("bubble").classList.remove("visible");
}

// === PANEL MANAGEMENT ===
var normalSize = { w: 192, h: 288 };
function openPanel(name) {
  document.getElementById(name).classList.add("visible");
  // Gallery gets a much larger window; settings stays compact
  var sz = name === "gallery" ? { w: 1000, h: 800 } : { w: 480, h: 420 };
  if (window.__TAURI__) {
    var win = window.__TAURI__.window.getCurrentWindow();
    var LS = window.__TAURI__.core.LogicalSize;
    win
      .setSize(
        LS
          ? new LS(sz.w, sz.h)
          : { width: sz.w, height: sz.h, type: "Logical" },
      )
      .catch(() => {});
  }
  document.body.style.width = sz.w + "px";
  document.body.style.height = sz.h + "px";
  if (name === "gallery") loadGallery();
  if (name === "switcher") loadSwitcher();
}
function closePanel(name) {
  document.getElementById(name).classList.remove("visible");
  if (window.__TAURI__) {
    var win = window.__TAURI__.window.getCurrentWindow();
    var LS = window.__TAURI__.core.LogicalSize;
    win
      .setSize(
        LS
          ? new LS(normalSize.w, normalSize.h)
          : { width: normalSize.w, height: normalSize.h, type: "Logical" },
      )
      .catch(() => {});
  }
  document.body.style.width = normalSize.w + "px";
  document.body.style.height = normalSize.h + "px";
}

// === PET GALLERY (with caching, auto-sync, install/uninstall, categories) ===
var allPets = [];
var installedSlugs = new Set();
var galleryShown = 0;
var galleryFiltered = [];
var galleryObserver = null;
var PAGE = 24;
var spriteCache = {}; // slug -> blob URL, avoids re-fetching on re-render
var activeCategory = "all";
var manifestCache = null;
var manifestCacheTime = 0;

// localStorage key for manifest cache (survives across app restarts within
// the same WebView2 profile — much faster than re-fetching 3.8MB each time)
var MANIFEST_CACHE_KEY = "petdex_manifest_cache_v1";
var MANIFEST_CACHE_TIME_KEY = "petdex_manifest_cache_time_v1";
var CACHE_TTL_MS = 60 * 60 * 1000; // 1 hour

async function loadGallery() {
  var grid = document.getElementById("pet-grid");

  // 1. Try to load from localStorage cache FIRST (instant)
  try {
    var cachedTime = parseInt(localStorage.getItem(MANIFEST_CACHE_TIME_KEY) || "0");
    var cached = localStorage.getItem(MANIFEST_CACHE_KEY);
    if (cached && cachedTime > 0) {
      allPets = JSON.parse(cached);
      manifestCacheTime = cachedTime;
      var age = Date.now() - cachedTime;
      if (age < CACHE_TTL_MS) {
        // Cache is fresh — show immediately
        await refreshInstalled();
        galleryFiltered = filterByCategory(allPets);
        galleryShown = 0;
        renderGalleryPage();
        // Still sync in background for any new pets
        syncManifestInBackground();
        return;
      }
      // Cache is stale — show it while fetching fresh
      grid.innerHTML = '<div class="loading">Showing cached list. Syncing...</div>';
      await refreshInstalled();
      galleryFiltered = filterByCategory(allPets);
      galleryShown = 0;
      renderGalleryPage();
    } else {
      grid.innerHTML = '<div class="loading">Fetching pets...</div>';
    }
  } catch (e) {
    grid.innerHTML = '<div class="loading">Fetching pets...</div>';
  }

  // 2. Fetch fresh manifest
  await syncManifest();

  // 3. Render
  await refreshInstalled();
  galleryFiltered = filterByCategory(allPets);
  galleryShown = 0;
  renderGalleryPage();
}

async function syncManifest() {
  try {
    var r = await fetch("https://petdex.dev/api/manifest");
    var data = await r.json();
    allPets = (data.pets || []).map(function (p) {
      return {
        slug: p.slug,
        name: p.displayName || p.slug,
        kind: p.kind || "unknown",
        sprite: p.spritesheetUrl || "",
      };
    });
    manifestCacheTime = Date.now();
    // Cache to localStorage
    try {
      localStorage.setItem(MANIFEST_CACHE_KEY, JSON.stringify(allPets));
      localStorage.setItem(MANIFEST_CACHE_TIME_KEY, String(manifestCacheTime));
    } catch (e) {}
    // Re-render with fresh data
    await refreshInstalled();
    galleryFiltered = filterByCategory(allPets);
    galleryShown = 0;
    renderGalleryPage();
  } catch (e) {
    // If fetch failed and we have cached data, keep showing it
    if (allPets.length === 0) {
      var grid = document.getElementById("pet-grid");
      if (grid)
        grid.innerHTML =
          '<div class="loading">Failed to load. Check your internet.</div>';
    }
  }
}

function syncManifestInBackground() {
  // Silently fetch fresh data. Only re-render if pets count changed.
  fetch("https://petdex.dev/api/manifest")
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var fresh = (data.pets || []).map(function (p) {
        return {
          slug: p.slug,
          name: p.displayName || p.slug,
          kind: p.kind || "unknown",
          sprite: p.spritesheetUrl || "",
        };
      });
      if (fresh.length !== allPets.length) {
        allPets = fresh;
        manifestCacheTime = Date.now();
        try {
          localStorage.setItem(MANIFEST_CACHE_KEY, JSON.stringify(allPets));
          localStorage.setItem(MANIFEST_CACHE_TIME_KEY, String(manifestCacheTime));
        } catch (e) {}
        galleryFiltered = filterByCategory(allPets);
        galleryShown = 0;
        renderGalleryPage();
      }
    })
    .catch(function () {});
}

function filterByCategory(pets) {
  if (activeCategory === "all") return pets;
  return pets.filter(function (p) {
    return (p.kind || "unknown") === activeCategory;
  });
}

function setCategory(cat) {
  activeCategory = cat;
  galleryFiltered = filterByCategory(allPets);
  galleryShown = 0;
  renderGalleryPage();
  // Update tab styles
  var tabs = document.querySelectorAll(".cat-tab");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove("active");
    if (tabs[i].getAttribute("data-cat") === cat) tabs[i].classList.add("active");
  }
}

async function refreshInstalled() {
  if (!window.__TAURI__ || !window.__TAURI__.core) return;
  try {
    var pets = await window.__TAURI__.core.invoke("list_installed_pets");
    installedSlugs = new Set((pets || []).map(function (p) { return p.slug; }));
  } catch (e) {}
}

// Preload sprites in parallel via fetch() + blob URLs (4-5x faster than
// sequential CSS background-image loading). Returns a map of slug→url.
function preloadSprites(pets) {
  var promises = pets.map(function (p) {
    if (spriteCache[p.slug]) return Promise.resolve(); // already cached
    return fetch(p.sprite)
      .then(function (r) { return r.blob(); })
      .then(function (blob) {
        spriteCache[p.slug] = URL.createObjectURL(blob);
      })
      .catch(function () {}); // skip failed sprites
  });
  return Promise.all(promises);
}

function renderGalleryPage() {
  var grid = document.getElementById("pet-grid");
  if (galleryShown === 0) grid.innerHTML = "";
  var end = Math.min(galleryShown + PAGE, galleryFiltered.length);
  var pagePets = galleryFiltered.slice(galleryShown, end);

  // Show placeholder cards immediately, then preload sprites in parallel
  var cards = [];
  for (var i = 0; i < pagePets.length; i++) {
    (function (p) {
      var card = document.createElement("div");
      card.className = "pet-card";
      var anim = document.createElement("div");
      anim.className = "pet-anim";
      var inner = document.createElement("div");
      inner.className = "pet-anim-inner";
      inner.dataset.slug = p.slug;
      // Use cached sprite if available, otherwise show placeholder
      if (spriteCache[p.slug]) {
        inner.style.backgroundImage = "url('" + spriteCache[p.slug] + "')";
      }
      anim.appendChild(inner);
      var nm = document.createElement("div");
      nm.className = "pname";
      nm.textContent = p.name;
      var sl = document.createElement("div");
      sl.className = "pslug";
      sl.textContent = p.slug;
      var btn = document.createElement("button");
      btn.className = "pet-btn";
      var isInstalled = installedSlugs.has(p.slug);
      btn.textContent = isInstalled ? "Uninstall" : "Install";
      btn.style.cssText = isInstalled ? "background:#e74c3c" : "background:#2ecc71";
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        handleInstallToggle(p, btn);
      });
      card.appendChild(anim);
      card.appendChild(nm);
      card.appendChild(sl);
      card.appendChild(btn);
      grid.appendChild(card);
      cards.push({ slug: p.slug, inner: inner });
    })(pagePets[i]);
  }
  galleryShown = end;

  // Preload all sprites for this page in parallel (4-5x faster)
  preloadSprites(pagePets).then(function () {
    for (var ci = 0; ci < cards.length; ci++) {
      var c = cards[ci];
      if (spriteCache[c.slug]) {
        c.inner.style.backgroundImage = "url('" + spriteCache[c.slug] + "')";
      }
    }
  });
  var old = grid.querySelector(".sentinel");
  if (old) old.remove();
  if (galleryShown < galleryFiltered.length) {
    var sentinel = document.createElement("div");
    sentinel.className = "sentinel";
    sentinel.textContent =
      "Loading more... (" + galleryShown + "/" + galleryFiltered.length + ")";
    grid.appendChild(sentinel);
    if (galleryObserver) galleryObserver.disconnect();
    galleryObserver = new IntersectionObserver(
      function (entries) {
        if (entries[0].isIntersecting) renderGalleryPage();
      },
      { root: document.getElementById("gallery-scroll"), threshold: 0.1 },
    );
    galleryObserver.observe(sentinel);
  } else {
    var done = document.createElement("div");
    done.className = "sentinel";
    done.textContent = "All " + galleryFiltered.length + " pets shown";
    grid.appendChild(done);
  }
}

function handleInstallToggle(p, btn) {
  if (!window.__TAURI__ || !window.__TAURI__.core) return;
  var invoke = window.__TAURI__.core.invoke;
  if (installedSlugs.has(p.slug)) {
    // Uninstall
    btn.textContent = "Removing...";
    btn.style.background = "#888";
    invoke("uninstall_pet", { slug: p.slug })
      .then(function () {
        installedSlugs.delete(p.slug);
        btn.textContent = "Install";
        btn.style.background = "#2ecc71";
        showBubble("Removed " + p.slug);
      })
      .catch(function (e) {
        btn.textContent = "Uninstall";
        btn.style.background = "#e74c3c";
        showBubble("Uninstall failed");
      });
  } else {
    // Install
    btn.textContent = "Installing...";
    btn.style.background = "#888";
    invoke("install_pet", {
      slug: p.slug,
      spriteUrl: p.sprite,
      displayName: p.name,
    })
      .then(function () {
        installedSlugs.add(p.slug);
        btn.textContent = "Uninstall";
        btn.style.background = "#e74c3c";
        showBubble("Installed " + p.slug);
      })
      .catch(function (e) {
        btn.textContent = "Install";
        btn.style.background = "#2ecc71";
        showBubble("Install failed: " + String(e).slice(0, 30));
      });
  }
}

// === PET SWITCHER (switch between installed pets, deduplicated) ===
function loadSwitcher() {
  if (!window.__TAURI__ || !window.__TAURI__.core) return;
  var invoke = window.__TAURI__.core.invoke;
  var grid = document.getElementById("switcher-grid");
  if (!grid) return;
  grid.innerHTML = '<div class="loading">Loading installed pets...</div>';
  invoke("list_installed_pets").then(function (pets) {
    grid.innerHTML = "";
    if (!pets || pets.length === 0) {
      grid.innerHTML =
        '<div class="loading">No pets installed. Use the gallery to install some.</div>';
      return;
    }
    // Deduplicate by slug (pet_roots checks both ~/.petdex/pets and ~/.codex/pets)
    var seen = {};
    var unique = [];
    for (var i = 0; i < pets.length; i++) {
      if (!seen[pets[i].slug]) {
        seen[pets[i].slug] = true;
        unique.push(pets[i]);
      }
    }
    var _loop_1 = function (p) {
      invoke("get_pet", { slug: p.slug }).then(function (meta) {
        if (!meta || !meta.sprite_path) return;
        invoke("read_file_as_base64", { path: meta.sprite_path }).then(function (b64) {
          var card = document.createElement("div");
          card.className = "pet-card";
          var anim = document.createElement("div");
          anim.className = "pet-anim";
          var inner = document.createElement("div");
          inner.className = "pet-anim-inner";
          inner.style.backgroundImage =
            "url(data:image/png;base64," + b64 + ")";
          anim.appendChild(inner);
          var nm = document.createElement("div");
          nm.className = "pname";
          nm.textContent = p.name;
          var sl = document.createElement("div");
          sl.className = "pslug";
          sl.textContent = p.slug;
          var btnRow = document.createElement("div");
          btnRow.style.cssText = "display:flex;gap:4px;margin-top:4px";
          var actBtn = document.createElement("button");
          actBtn.className = "pet-btn";
          actBtn.textContent = "Activate";
          actBtn.style.cssText = "flex:1;pointer-events:auto;position:relative;z-index:5";
          actBtn.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            actBtn.textContent = "...";
            invoke("set_active_pet", { slug: p.slug })
              .then(function () {
                showBubble("Switched to " + p.name);
                closePanel("switcher");
                setTimeout(function () { loadActivePet(); }, 200);
              })
              .catch(function (err) {
                actBtn.textContent = "Activate";
                showBubble("Switch failed");
              });
          });
          var rmBtn = document.createElement("button");
          rmBtn.className = "pet-btn";
          rmBtn.textContent = "Remove";
          rmBtn.style.cssText = "flex:0 0 auto;background:#e74c3c;width:60px;pointer-events:auto;position:relative;z-index:5";
          rmBtn.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            rmBtn.textContent = "...";
            invoke("uninstall_pet", { slug: p.slug })
              .then(function () {
                showBubble("Removed " + p.name);
                card.remove();
              })
              .catch(function (err) {
                rmBtn.textContent = "Remove";
                showBubble("Remove failed");
              });
          });
          btnRow.appendChild(actBtn);
          btnRow.appendChild(rmBtn);
          card.appendChild(anim);
          card.appendChild(nm);
          card.appendChild(sl);
          card.appendChild(btnRow);
          grid.appendChild(card);
        }).catch(function () {});
      }).catch(function () {});
    };
    for (var i = 0; i < unique.length; i++) {
      _loop_1(unique[i]);
    }
  }).catch(function (e) {
    grid.innerHTML = '<div class="loading">Failed to load pets.</div>';
  });
}

// === TAURI INIT (wire all buttons via addEventListener, NOT inline onclick) ===
function initTauri() {
  var t = window.__TAURI__;
  if (!t || !t.core) {
    setTimeout(initTauri, 100);
    return;
  }
  var invoke = t.core.invoke;

  // Quit button (red X)
  document.getElementById("quit").addEventListener("click", (e) => {
    e.stopPropagation();
    e.preventDefault();
    invoke("quit_app");
  });
  // Right-click = quit
  document.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    invoke("quit_app");
  });

  // Switch button (green swap icon)
  document.getElementById("switch-btn").addEventListener(
    "click",
    (e) => {
      e.stopPropagation();
      e.preventDefault();
      openPanel("switcher");
    },
    true,
  );

  // Switcher close button
  document
    .getElementById("switcher-close")
    .addEventListener("click", (e) => {
      e.stopPropagation();
      closePanel("switcher");
    });

  // Gallery button (blue eye) — use mouseup to survive drag-region capture
  document.getElementById("gallery-btn").addEventListener(
    "click",
    (e) => {
      e.stopPropagation();
      e.preventDefault();
      openPanel("gallery");
    },
    true,
  );
  document.getElementById("gallery-btn").addEventListener(
    "mouseup",
    (e) => {
      e.stopPropagation();
      e.preventDefault();
      openPanel("gallery");
    },
    true,
  );

  // Category tabs in gallery
  var catTabs = document.querySelectorAll(".cat-tab");
  for (var ci = 0; ci < catTabs.length; ci++) {
    (function (tab) {
      tab.addEventListener("click", function (e) {
        e.stopPropagation();
        setCategory(tab.getAttribute("data-cat"));
      });
    })(catTabs[ci]);
  }

  // Middle-click = settings panel (merged with drag handler, no conflict)
  document.getElementById("root").addEventListener("auxclick", (e) => {
    if (e.button === 1) {
      e.preventDefault();
      e.stopPropagation();
      openPanel("settings");
    }
  });

  // Settings close button
  document.getElementById("settings-close").addEventListener("click", (e) => {
    e.stopPropagation();
    closePanel("settings");
  });

  // Gallery close button
  document.getElementById("gallery-close").addEventListener("click", (e) => {
    e.stopPropagation();
    closePanel("gallery");
  });

  // Search box — reset pagination + filter
  document.getElementById("pet-search").addEventListener("input", function () {
    var q = this.value.toLowerCase();
    galleryFiltered = allPets.filter(
      (p) =>
        p.slug.toLowerCase().indexOf(q) >= 0 ||
        p.name.toLowerCase().indexOf(q) >= 0,
    );
    galleryShown = 0;
    renderGalleryPage();
  });

  // Settings save
  document.getElementById("save-key").addEventListener("click", () => {
    var key = document.getElementById("or-key").value.trim();
    if (!key) {
      document.getElementById("key-status").textContent = "Key is empty.";
      return;
    }
    invoke("set_openrouter_key", { key: key })
      .then(() => {
        document.getElementById("key-status").textContent = "Saved locally!";
        document.getElementById("or-key").value = "";
      })
      .catch((err) => {
        document.getElementById("key-status").textContent =
          "Save failed: " + String(err).slice(0, 40);
      });
  });

  // Spawn sidecar
  invoke("spawn_sidecar").catch(() => {});

  // State polling
  var lastState = 0,
    lastBubble = 0;
  setInterval(() => {
    invoke("read_runtime_state")
      .then((d) => {
        if (d && d.counter !== lastState) {
          lastState = d.counter;
          if (d.state) setState(d.state);
        }
      })
      .catch(() => {});
  }, 200);
  setInterval(() => {
    invoke("read_runtime_bubble")
      .then((d) => {
        if (d && d.counter !== lastBubble) {
          lastBubble = d.counter;
          var b = document.getElementById("bubble");
          if (d.text) {
            b.textContent = d.text;
            b.classList.add("visible");
          } else {
            b.classList.remove("visible");
          }
        }
      })
      .catch(() => {});
  }, 200);
}
initTauri();
</script>
