<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Petdex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: transparent;
      width: 192px;
      height: 288px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #root {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 192px;
      height: 208px;
      cursor: grab;
    }
    #root:active { cursor: grabbing; }

    /* Verbatim from src/app/globals.css — .pet-sprite-frame and .pet-sprite.
       background-image uses var(--sprite-url) which we set to the base64
       data URI injected at runtime via read_file_as_base64. */
    .pet-sprite-frame {
      --pet-scale: 1;
      width: calc(192px * var(--pet-scale));
      height: calc(208px * var(--pet-scale));
      overflow: hidden;
      /* Promote to its own paint layer so the browser does not evict the
         WebP decode buffer when the window is off-screen. */
      contain: layout paint;
    }

    .pet-sprite {
      --sprite-row: 0;
      --sprite-frames: 6;
      --sprite-duration: 1100ms;
      --sprite-y: calc(var(--sprite-row) * -208px);
      --sprite-end-x: calc(var(--sprite-frames) * -192px);
      width: 192px;
      height: 208px;
      background-image: var(--sprite-url);
      background-repeat: no-repeat;
      background-size: 1536px 1872px;
      image-rendering: pixelated;
      /* translateZ(0) forces GPU-composited layer so animation stays
         on the compositor thread instead of being re-rasterized. */
      transform: scale(var(--pet-scale)) translateZ(0);
      transform-origin: top left;
      will-change: background-position;
      animation: pet-state var(--sprite-duration) steps(var(--sprite-frames)) infinite;
    }

    @keyframes pet-state {
      from { background-position: 0 var(--sprite-y); }
      to   { background-position: var(--sprite-end-x) var(--sprite-y); }
    }

    @media (prefers-reduced-motion: reduce) {
      .pet-sprite { animation: none; }
    }

    #bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.93);
      color: #111;
      font: 11px/1.4 system-ui, sans-serif;
      padding: 6px 10px;
      border-radius: 8px;
      max-width: 180px;
      word-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
      white-space: pre-wrap;
    }
    #bubble.visible { opacity: 1; }

    #debug {
      position: fixed;
      top: 2px;
      left: 2px;
      font: 9px monospace;
      color: rgba(255, 255, 255, 0.45);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="bubble"></div>
    <div
      class="pet-sprite-frame"
      id="sprite-frame"
      role="img"
      aria-label="Petdex pet"
      style="--pet-scale: 1"
    >
      <div class="pet-sprite" id="sprite"></div>
    </div>
  </div>
  <div id="debug">loading...</div>

<script type="module">
const { invoke } = window.__TAURI__.core;
const { getCurrentWindow } = window.__TAURI__.window;

// Verbatim from src/lib/pet-states.ts
const PET_STATES = {
  "idle":          { row: 0, frames: 6, durationMs: 1100 },
  "running-right": { row: 1, frames: 8, durationMs: 1060 },
  "running-left":  { row: 2, frames: 8, durationMs: 1060 },
  "waving":        { row: 3, frames: 4, durationMs:  700 },
  "jumping":       { row: 4, frames: 5, durationMs:  840 },
  "failed":        { row: 5, frames: 8, durationMs: 1220 },
  "waiting":       { row: 6, frames: 6, durationMs: 1010 },
  "running":       { row: 7, frames: 6, durationMs:  820 },
  "review":        { row: 8, frames: 6, durationMs: 1030 },
};

const DEFAULT_STATE = "idle";

let lastStateCounter = 0;
let lastBubbleCounter = 0;

function applyState(stateId) {
  const s = PET_STATES[stateId] ?? PET_STATES[DEFAULT_STATE];
  const sprite = document.getElementById("sprite");
  sprite.style.setProperty("--sprite-row", s.row);
  sprite.style.setProperty("--sprite-frames", s.frames);
  sprite.style.setProperty("--sprite-duration", `${s.durationMs}ms`);
}

async function boot() {
  try {
    const pet = await invoke("get_active_pet");
    if (!pet) { dbg("no pet found"); return; }

    const b64 = await invoke("read_file_as_base64", { path: pet.sprite_path })
      .catch((err) => { throw new Error(`spritesheet load failed: ${err}`); });
    const ext = pet.sprite_path.endsWith(".png") ? "png" : "webp";
    document.getElementById("sprite").style.setProperty(
      "--sprite-url",
      `url("data:image/${ext};base64,${b64}")`
    );
    applyState(DEFAULT_STATE);
    dbg(pet.name);

    // Default to click-through ON: transparent regions of the overlay pass
    // pointer events to the desktop so the user can interact with whatever
    // is behind the pet. The root sprite element's mouseenter flips it OFF
    // (drag/right-click grab), mouseleave flips it back ON (Faksimile
    // pattern, plan §4.4).
    await setClickThrough(true);
    wireClickThrough();

    await bootSidecar();
  } catch (e) {
    dbg(`err: ${String(e).slice(0, 40)}`);
    console.error(e);
  }
}

// ─── Click-through bridge (plan §4.4) ──────────────────────────────
// Toggles the Win32 WS_EX_TRANSPARENT style via the Rust command. When ON,
// clicks pass through the whole window to the desktop; when OFF the window
// receives them (drag handle + right-click menu). The bridge drives this on
// mouseenter/mouseleave of the interactive sprite area so transparent
// regions are click-through while the pet body stays grabbable.
async function setClickThrough(through) {
  try {
    await invoke("set_click_through", { through });
  } catch (e) {
    // The command only exists on Windows; on other platforms it's a no-op
    // error we swallow.
    console.debug("set_click_through:", e);
  }
}

function wireClickThrough() {
  const rootEl = document.getElementById("root");
  // Hovering the sprite/interactive area → window should capture clicks.
  rootEl.addEventListener("mouseenter", () => setClickThrough(false));
  // Leaving the sprite → transparent regions should pass clicks through.
  rootEl.addEventListener("mouseleave", () => setClickThrough(true));
}

// Polling reads runtime files written by the sidecar to ~/.petdex/runtime/.
// File-based reads are CORS-free: the sidecar's HTTP server does not set
// CORS headers, so Chromium (WebView2) blocks all cross-origin fetch() from
// the WebView. Using Tauri invoke() calls instead sidesteps this entirely.
function startPolling() {
  // 200ms matches the trusted Zig desktop cadence.
  // 3s / 2s intervals would miss short-lived states (waving 700ms, running 820ms).
  setInterval(pollState, 200);
  setInterval(pollBubble, 200);
}

async function bootSidecar() {
  // Start polling immediately — file reads work whenever the sidecar has
  // written its files, even from a previous session that left them on disk.
  startPolling();
  try {
    await invoke("spawn_sidecar");
  } catch (e) {
    console.warn("sidecar spawn failed:", e);
  }
}

async function pollState() {
  try {
    const data = await invoke("read_runtime_state");
    if (!data) return;
    if (data.counter === lastStateCounter) return;
    lastStateCounter = data.counter;
    applyState(data.state ?? DEFAULT_STATE);
  } catch {}
}

async function pollBubble() {
  try {
    const data = await invoke("read_runtime_bubble");
    if (!data) return;
    if (data.counter === lastBubbleCounter) return;
    lastBubbleCounter = data.counter;
    // Pass text directly — showBubble treats empty as the clear signal.
    showBubble(data.text ?? "");
  } catch {}
}

function showBubble(text) {
  const el = document.getElementById("bubble");
  if (!text) {
    // Empty text is the sidecar's explicit clear signal (written on boot).
    el.textContent = "";
    el.classList.remove("visible");
    return;
  }
  el.textContent = text;
  // Bubble persists until next update — no auto-hide timeout.
  el.classList.add("visible");
}

// ─── Momentum/throw drag physics (plan §4.5) ───────────────────────
// Tauri's startDragging() moves the window but has no inertia — release
// stops dead. We track pointer velocity during the drag and apply an
// inertial coast (exponential decay) on release via setPosition, mirroring
// the macOS Zig shell's momentum drag (main.zig:998-1077).
const root = document.getElementById("root");
const win = getCurrentWindow();
let dragging = false;
let lastPos = { x: 0, y: 0 };       // last pointer screen pos
let lastTime = 0;                    // ms timestamp of last move
let velocity = { x: 0, y: 0 };       // px/ms
let rafId = 0;

root.addEventListener("mousedown", async (e) => {
  if (e.button !== 0) return;        // left button only
  dragging = true;
  cancelAnimationFrame(rafId);
  // startDragging hands the move loop to the OS; we sample the window
  // position on mousemove to derive velocity for the release coast.
  lastPos = { x: e.screenX, y: e.screenY };
  lastTime = performance.now();
  velocity = { x: 0, y: 0 };
  try { await win.startDragging(); } catch {}
});

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  const now = performance.now();
  const dt = Math.max(1, now - lastTime);
  // Exponential moving average smooths jitter without lagging a fast fling.
  const inst = { x: (e.screenX - lastPos.x) / dt, y: (e.screenY - lastPos.y) / dt };
  velocity = { x: velocity.x * 0.6 + inst.x * 0.4, y: velocity.y * 0.6 + inst.y * 0.4 };
  lastPos = { x: e.screenX, y: e.screenY };
  lastTime = now;
});

document.addEventListener("mouseup", () => {
  if (!dragging) return;
  dragging = false;
  // Only coast if there was a real flick; tiny drags just drop in place.
  const speed = Math.hypot(velocity.x, velocity.y);
  if (speed < 0.3) return;           // ~px/ms threshold
  rafId = requestAnimationFrame(coast);
});

async function coast() {
  // Decay velocity each frame and nudge the window by the per-frame delta.
  // 0.92 gives a natural ~0.5s glide; stop when the speed is negligible.
  velocity = { x: velocity.x * 0.92, y: velocity.y * 0.92 };
  if (Math.hypot(velocity.x, velocity.y) < 0.05) return;
  try {
    const pos = await win.outerPosition();
    // velocity is px/ms; ~16ms/frame → scale to frame delta.
    const nx = Math.round(pos.x + velocity.x * 16);
    const ny = Math.round(pos.y + velocity.y * 16);
    await win.setPosition({ x: nx, y: ny });
  } catch {}
  rafId = requestAnimationFrame(coast);
}

// ─── Pet picker (plan §4.5) ────────────────────────────────────────
// Shift+click opens a picker: the window expands to a 480×420 grid of
// installed pets and the click selects the active one (written to
// ~/.petdex/active.json by the sidecar via a POST). Mirrors main.zig's
// picker window (1092-1095).
const PICKER_W = 480, PICKER_H = 420;
const NORMAL_W = 192, NORMAL_H = 288;

async function openPicker() {
  try {
    // setSize accepts a LogicalSize in Tauri v2. With withGlobalTauri the
    // constructor lives at window.__TAURI__.core.LogicalSize; fall back to
    // a plain object {width,height,type} if the class isn't exposed.
    const LS = window.__TAURI__?.core?.LogicalSize;
    const size = LS ? new LS(PICKER_W, PICKER_H) : { width: PICKER_W, height: PICKER_H, type: "Logical" };
    await win.setSize(size);
    const slugs = await invoke("list_pets");
    renderPicker(slugs);
  } catch (e) { dbg(`picker err: ${String(e).slice(0, 30)}`); }
}

async function closePicker() {
  try {
    const LS = window.__TAURI__?.core?.LogicalSize;
    const size = LS ? new LS(NORMAL_W, NORMAL_H) : { width: NORMAL_W, height: NORMAL_H, type: "Logical" };
    await win.setSize(size);
    document.getElementById("picker")?.remove();
  } catch {}
}

function renderPicker(slugs) {
  let el = document.getElementById("picker");
  if (!el) {
    el = document.createElement("div");
    el.id = "picker";
    el.style.cssText =
      "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(20,20,25,0.96);color:#eee;overflow:auto;padding:12px;font:13px/1.4 system-ui,sans-serif";
    document.body.appendChild(el);
  }
  el.innerHTML = `<div style="margin-bottom:8px;font-weight:600">Pick a pet</div>`;
  const grid = document.createElement("div");
  grid.style.cssText = "display:grid;grid-template-columns:repeat(3,1fr);gap:8px";
  for (const slug of slugs) {
    const card = document.createElement("div");
    card.textContent = slug;
    card.style.cssText =
      "padding:10px 8px;background:rgba(255,255,255,0.08);border-radius:6px;cursor:pointer;text-align:center;overflow:hidden;text-overflow:ellipsis";
    card.onclick = async () => {
      await invoke("set_active_pet", { slug });
      await closePicker();
      location.reload();   // reload the sprite for the new active pet
    };
    grid.appendChild(card);
  }
  el.appendChild(grid);
  // Close button.
  const close = document.createElement("div");
  close.textContent = "✕ close";
  close.style.cssText = "margin-top:10px;cursor:pointer;color:#999";
  close.onclick = closePicker;
  el.appendChild(close);
}

root.addEventListener("click", (e) => {
  if (e.shiftKey) { e.preventDefault(); openPicker(); }
});

window.addEventListener("contextmenu", async (e) => {
  e.preventDefault();
  // Right-click anywhere = quit (matches the existing contract).
  await invoke("stop_sidecar");
  await invoke("quit_app");
});

function dbg(msg) {
  document.getElementById("debug").textContent = msg;
}

boot();
</script>
</body>
</html>
